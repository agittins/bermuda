# Home Assistant Quality Scale self-assessment for Bermuda.
#
# Self-assessment maintained by the fork, validated by hassfest (which also
# checks it against the `quality_scale` tier declared in manifest.json).
# The docs-* rules are satisfied by the corresponding README sections.

rules:
  # --- Bronze ---------------------------------------------------------------
  action-setup: done
  appropriate-polling:
    status: done
    comment: >-
      Driven by Bluetooth adverts; the coordinator update_interval only paces the
      smoothing/calculation loop. No external polling.
  brands:
    status: exempt
    comment: Community fork; not published in the home-assistant/brands repository.
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency:
    status: done
    comment: No external Python requirements; relies only on Home Assistant components.
  docs-actions:
    status: done
    comment: README "Actions (services)" section documents all 12 actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions:
    status: done
    comment: README "Removal" section.
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: Local BLE; there is no device/connection to probe before creating the entry.
  test-before-setup: done
  unique-config-entry:
    status: done
    comment: Single instance enforced via single_instance_allowed abort.

  # --- Silver ---------------------------------------------------------------
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: done
    comment: README "Configuration options" table covers every option and subentry.
  docs-installation-parameters:
    status: done
    comment: README "Configuration options" - the setup flow itself has no parameters (single instance, confirm only).
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Local BLE; there are no credentials to re-authenticate.
  test-coverage:
    status: done
    comment: 99.5% (584 tests); enforced by the coverage gate (fail_under=95).

  # --- Gold -----------------------------------------------------------------
  devices: done
  diagnostics: done
  discovery: done
  discovery-update-info:
    status: exempt
    comment: Bluetooth discovery only bootstraps the single instance; there is no per-device network info to refresh.
  docs-data-update:
    status: done
    comment: README "How data updates work" section.
  docs-examples:
    status: done
    comment: README "Example automations" section.
  docs-known-limitations:
    status: done
    comment: README "Known limitations" section.
  docs-supported-devices:
    status: done
    comment: README "Supported devices" section.
  docs-supported-functions:
    status: done
    comment: README "Entities provided" section.
  docs-troubleshooting:
    status: done
    comment: README "Troubleshooting" section.
  docs-use-cases:
    status: done
    comment: README "Use cases" section.
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: exempt
    comment: No connection settings to reconfigure; all tuning lives in the options flow.
  repair-issues: done
  stale-devices: done

  # --- Platinum -------------------------------------------------------------
  async-dependency:
    status: done
    comment: No third-party dependencies; all I/O goes through Home Assistant's async Bluetooth stack.
  inject-websession:
    status: exempt
    comment: No web session; the integration is local BLE only.
  strict-typing:
    status: done
    comment: mypy --strict passes with zero errors ([tool.mypy] in pyproject.toml); ANN ruff rules enabled.
