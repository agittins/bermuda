name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # daily — CVEs don't wait for the weekly Renovate run
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # homeassistant >= 2026.3 requires Python >= 3.14.2
          python-version: "3.14"
          cache: pip

      - name: Install pip-audit
        # pip (not pipx): pipx would install against the runner's system
        # Python 3.12, which cannot resolve homeassistant>=2026.3 (needs 3.14).
        run: pip install pip-audit

      - name: Audit manifest.json (HA integration requirements)
        run: |
          for m in $(find custom_components -name manifest.json); do
            jq -r '.requirements[]' "$m" > /tmp/m_reqs.txt 2>/dev/null || true
            if [ -s /tmp/m_reqs.txt ]; then
              echo "::group::pip-audit $m"
              pip-audit --requirement /tmp/m_reqs.txt --strict || true
              echo "::endgroup::"
            fi
          done

      - name: Audit requirements files
        # Ignored vulns are in packages pinned exactly by homeassistant core
        # itself, so we cannot bump them here. Remove once HA ships a fix:
        #   PYSEC-2026-17[5-9]                    -> PyJWT  2.12.1 (fixed in 2.13.0)
        #   PYSEC-2026-225[3-7], PYSEC-2026-345[1-3] -> Pillow 12.2.0 (fixed in 12.3.0)
        run: |
          for r in requirements.txt requirements_test.txt requirements_dev.txt; do
            if [ -f "$r" ]; then
              echo "::group::pip-audit $r"
              pip-audit --requirement "$r" --strict \
                --ignore-vuln PYSEC-2026-175 \
                --ignore-vuln PYSEC-2026-176 \
                --ignore-vuln PYSEC-2026-177 \
                --ignore-vuln PYSEC-2026-178 \
                --ignore-vuln PYSEC-2026-179 \
                --ignore-vuln PYSEC-2026-2253 \
                --ignore-vuln PYSEC-2026-2254 \
                --ignore-vuln PYSEC-2026-2255 \
                --ignore-vuln PYSEC-2026-2256 \
                --ignore-vuln PYSEC-2026-2257 \
                --ignore-vuln PYSEC-2026-3451 \
                --ignore-vuln PYSEC-2026-3452 \
                --ignore-vuln PYSEC-2026-3453
              echo "::endgroup::"
            fi
          done

  # NOTE: the former OSV-Scanner job was removed on purpose. On unlocked
  # requirements files it speculatively resolves phantom versions that are
  # never actually installed (e.g. pytest 6.2.2 vs the real 9.x), producing
  # permanent false positives. Real-resolution auditing is covered by
  # pip-audit above; actions/workflows by Dependency Review + CodeQL; and
  # CVE-driven bumps by Renovate vulnerabilityAlerts.

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lockfile-freshness:
    name: Lockfile age check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Check lockfile age
        run: |
          for lock in package-lock.json yarn.lock pnpm-lock.yaml poetry.lock Pipfile.lock Cargo.lock; do
            [ -f "$lock" ] || continue
            AGE=$(( ($(date +%s) - $(git log -1 --format=%ct -- "$lock")) / 86400 ))
            if [ $AGE -gt 90 ]; then
              echo "::error file=$lock::$lock not regenerated for $AGE days — likely CVEs, refresh it"
              exit 1
            elif [ $AGE -gt 60 ]; then
              echo "::warning file=$lock::$lock is getting stale ($AGE days)"
            fi
          done

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
