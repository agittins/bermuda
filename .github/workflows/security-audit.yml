name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # daily — CVEs don't wait for the weekly Renovate run
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # homeassistant >= 2026.3 requires Python >= 3.14.2
          python-version: "3.14"
          cache: pip

      - name: Install pip-audit
        # pip (not pipx): pipx would install against the runner's system
        # Python 3.12, which cannot resolve homeassistant>=2026.3 (needs 3.14).
        run: pip install pip-audit

      - name: Audit manifest.json (HA integration requirements)
        run: |
          for m in $(find custom_components -name manifest.json); do
            jq -r '.requirements[]' "$m" > /tmp/m_reqs.txt 2>/dev/null || true
            if [ -s /tmp/m_reqs.txt ]; then
              echo "::group::pip-audit $m"
              pip-audit --requirement /tmp/m_reqs.txt --strict || true
              echo "::endgroup::"
            fi
          done

      - name: Audit requirements files
        # PyJWT and Pillow are pinned exactly by homeassistant core, so their
        # vulns cannot be fixed here — and new CVE/GHSA aliases for the same
        # flaws keep being published, which breaks any ID-based ignore list.
        # Exclude those two packages by NAME until HA bumps them (they are
        # dev/test-env-only deps: Bermuda itself has no runtime requirements).
        # Any vulnerability in any other package still fails the job.
        run: |
          HA_PINNED='["pillow", "pyjwt"]'
          FAILED=0
          for r in requirements.txt requirements_test.txt requirements_dev.txt; do
            [ -f "$r" ] || continue
            echo "::group::pip-audit $r"
            pip-audit --requirement "$r" --strict --format json --output /tmp/audit.json || true
            # A missing/invalid report means pip-audit itself failed (e.g.
            # dependency resolution error) — fail loudly in that case.
            jq -e 'has("dependencies")' /tmp/audit.json > /dev/null
            jq --argjson skip "$HA_PINNED" -r \
              '.dependencies[] | select((.vulns | length) > 0) | select(.name as $n | $skip | index($n)) |
               "::notice::\(.name) \(.version): \(.vulns | length) known vulns ignored (pinned by homeassistant core)"' \
              /tmp/audit.json
            REAL=$(jq --argjson skip "$HA_PINNED" \
              '[.dependencies[] | select((.vulns | length) > 0) | select(.name as $n | $skip | index($n) | not)]' \
              /tmp/audit.json)
            if [ "$(echo "$REAL" | jq 'length')" -gt 0 ]; then
              echo "$REAL" | jq .
              echo "::error::pip-audit found vulnerabilities in $r (outside HA-pinned pillow/pyjwt)"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED

  # NOTE: the former OSV-Scanner job was removed on purpose. On unlocked
  # requirements files it speculatively resolves phantom versions that are
  # never actually installed (e.g. pytest 6.2.2 vs the real 9.x), producing
  # permanent false positives. Real-resolution auditing is covered by
  # pip-audit above; actions/workflows by Dependency Review + CodeQL; and
  # CVE-driven bumps by Renovate vulnerabilityAlerts.

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lockfile-freshness:
    name: Lockfile age check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Check lockfile age
        run: |
          for lock in package-lock.json yarn.lock pnpm-lock.yaml poetry.lock Pipfile.lock Cargo.lock; do
            [ -f "$lock" ] || continue
            AGE=$(( ($(date +%s) - $(git log -1 --format=%ct -- "$lock")) / 86400 ))
            if [ $AGE -gt 90 ]; then
              echo "::error file=$lock::$lock not regenerated for $AGE days — likely CVEs, refresh it"
              exit 1
            elif [ $AGE -gt 60 ]; then
              echo "::warning file=$lock::$lock is getting stale ($AGE days)"
            fi
          done

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
