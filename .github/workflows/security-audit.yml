name: Security audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *" # daily — CVEs don't wait for the weekly Renovate run
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pipx install pip-audit

      - name: Audit manifest.json (HA integration requirements)
        run: |
          for m in $(find custom_components -name manifest.json); do
            jq -r '.requirements[]' "$m" > /tmp/m_reqs.txt 2>/dev/null || true
            if [ -s /tmp/m_reqs.txt ]; then
              echo "::group::pip-audit $m"
              pip-audit --requirement /tmp/m_reqs.txt --strict || true
              echo "::endgroup::"
            fi
          done

      - name: Audit requirements files
        run: |
          for r in requirements.txt requirements_test.txt requirements_dev.txt; do
            if [ -f "$r" ]; then
              echo "::group::pip-audit $r"
              pip-audit --requirement "$r" --strict
              echo "::endgroup::"
            fi
          done

  osv-scanner:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |
            --recursive
            --skip-git
            ./

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lockfile-freshness:
    name: Lockfile age check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - name: Check lockfile age
        run: |
          for lock in package-lock.json yarn.lock pnpm-lock.yaml poetry.lock Pipfile.lock Cargo.lock; do
            [ -f "$lock" ] || continue
            AGE=$(( ($(date +%s) - $(git log -1 --format=%ct -- "$lock")) / 86400 ))
            if [ $AGE -gt 90 ]; then
              echo "::error file=$lock::$lock not regenerated for $AGE days — likely CVEs, refresh it"
              exit 1
            elif [ $AGE -gt 60 ]; then
              echo "::warning file=$lock::$lock is getting stale ($AGE days)"
            fi
          done

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
